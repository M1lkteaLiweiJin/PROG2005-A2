<h2>Search Books</h2>
<input [(ngModel)]="searchKeyword" placeholder="Search by title or author">
<button (click)="searchBooks()">Search</button>

<div class="results">
  <h4>Search Results</h4>
  <div *ngIf="filteredBooks.length === 0">No matching books found.</div>
  <div *ngFor="let book of filteredBooks" class="result-item">
    {{ book.title }} by {{ book.author }} ({{ book.year }})
  </div>
</div>
