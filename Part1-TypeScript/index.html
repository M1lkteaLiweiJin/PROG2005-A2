<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library Management System - Part 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Library Book Management System</h1>

        <div class="form-section">
            <h3>Add New Book</h3>
            <input type="number" id="bookId" placeholder="Book ID">
            <input type="text" id="title" placeholder="Book Title">
            <input type="text" id="author" placeholder="Author Name">
            <input type="text" id="genre" placeholder="Genre">
            <input type="number" id="year" placeholder="Publication Year">
            <button onclick="addNewBook()">Add Book</button>
        </div>

        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Search by title">
            <button onclick="searchBook()">Search</button>
            <button onclick="showAllBooks()">Show All Books</button>
        </div>

        <div id="output" class="output"></div>
    </div>

    <script src="book-system.js"></script>
</body>
</html>
